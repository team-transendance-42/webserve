server {
    listen      127.0.0.1:8080;
    server_name one www.one;
    client_max_body_size 10000000;

    error_page 404 ./www/errors/404.html;
    error_page 500 ./www/errors/500.html;

    # Default location
    location / {
        root            ./www/one;
        index           index.html;
        autoindex       off;
        limit_except    GET POST DELETE;
    }

    # File uploads
    location /upload {
        root            ./www/one;
        limit_except    POST;
        upload_enable   on;
        upload_path     ./www/uploads;
        client_max_body_size 5000000;
    }

    # Directory listing example
    location /files {
        root        ./www/one;
        autoindex   on;
        limit_except GET;
    }

    # CGI — Python
    location /cgi-bin {
        root            ./www/cgi-bin;
        limit_except    GET POST;
        cgi .py         /usr/bin/python3;
        cgi .php        /usr/bin/php-cgi;
    }

    # Redirect example
    location /old {
        return 301 /new;
    }
}

server {
    listen      127.0.0.1:8081;
    server_name two;
    client_max_body_size 1000000;

    error_page 404 ./www/errors/404.html;
    error_page 403 ./www/errors/403.html;

    location / {
        root        ./www/two;
        index       index.html;
        autoindex   off;
        limit_except GET;
    }

    location /api {
        root        ./www/two;
        limit_except POST DELETE;
        client_max_body_size 2000000;
    }
}