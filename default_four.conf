# =============================================================
#  default.conf  —  4 virtual servers, all plain HTTP
# =============================================================

# ─────────────────────────────────────────
# SERVER 1 — "one"  on port 8080
# ─────────────────────────────────────────
server {
    listen          8080;
    host            127.0.0.1;
    server_name     one;

    client_max_body_size    1048576;    # 1MB

    error_page      400     /errors/400.html;
    error_page      403     /errors/403.html;
    error_page      404     /errors/404.html;
    error_page      500     /errors/500.html;

    location / {
        root            ./www/one;
        index           index.html;
        autoindex       off;
        allowed_methods GET POST;
    }

    location /static {
        root            ./www/one/static;
        autoindex       on;
        allowed_methods GET;
    }

    location /upload {
        root                ./www/one/uploads;
        allowed_methods     GET POST DELETE;
        client_max_body_size 10485760;   # 10MB override
        upload_path         ./www/one/uploads;
    }

    location /game_start {
        root ./www/one/pages;
        index game_start.html;
        autoindex off;
        allowed_methods GET;
    }

    location /cgi-bin {
        root            ./www/one/cgi-bin;
        cgi_extension   .py;
        cgi_pass        /usr/bin/python3;
        allowed_methods GET POST;
    }
}

# ─────────────────────────────────────────
# SERVER 2 — "two"  on port 8081
# ─────────────────────────────────────────
server {
    listen          8081;
    host            127.0.0.1;
    server_name     two;

    client_max_body_size    512000;     # 500KB

    error_page      400     /errors/400.html;
    error_page      403     /errors/403.html;
    error_page      404     /errors/404.html;
    error_page      500     /errors/500.html;

    location / {
        root            ./www/two;
        index           index.html;
        autoindex       off;
        allowed_methods GET;
    }

    location /api {
        root            ./www/two/api;
        allowed_methods GET POST DELETE;
        autoindex       off;
    }

    location /files {
        root            ./www/two/files;
        autoindex       on;
        allowed_methods GET;
    }

    location /old {
        return          301 /;
    }
}

# ─────────────────────────────────────────
# SERVER 3 — "three"  on port 8082
# ─────────────────────────────────────────
server {
    listen          8082;
    host            127.0.0.1;
    server_name     three;

    client_max_body_size    2097152;    # 2MB

    error_page      400     /errors/400.html;
    error_page      403     /errors/403.html;
    error_page      404     /errors/404.html;
    error_page      500     /errors/500.html;

    location / {
        root            ./www/three;
        index           index.html;
        autoindex       off;
        allowed_methods GET POST;
    }

    location /upload {
        root                ./www/three/uploads;
        allowed_methods     POST DELETE;
        client_max_body_size 5242880;   # 5MB override
        upload_path         ./www/three/uploads;
    }

    location /cgi-bin {
        root            ./www/three/cgi-bin;
        cgi_extension   .php;
        cgi_pass        /usr/bin/php-cgi;
        allowed_methods GET POST;
    }

    location /docs {
        root            ./www/three/docs;
        autoindex       on;
        allowed_methods GET;
    }
}

# ─────────────────────────────────────────
# SERVER 4 — "four"  on port 8083
# (same port as "three" — differentiated by server_name)
# ─────────────────────────────────────────
server {
    listen          8083;
    host            127.0.0.1;
    server_name     four;

    client_max_body_size    1048576;    # 1MB

    error_page      400     /errors/400.html;
    error_page      403     /errors/403.html;
    error_page      404     /errors/404.html;
    error_page      500     /errors/500.html;

    location / {
        root            ./www/four;
        index           index.html;
        autoindex       off;
        allowed_methods GET;
    }

    location /api {
        root            ./www/four/api;
        allowed_methods GET POST;
        autoindex       off;
    }

    location /cgi-bin {
        root            ./www/four/cgi-bin;
        cgi_extension   .py;
        cgi_pass        /usr/bin/python3;
        allowed_methods GET POST;
    }

    location /redirect {
        return          302 /;
    }
}

# How virtual hosting works on the same port

# Two servers sharing port `8080` is fine — the server picks which one to use via the `Host:` header the browser sends:

# Request arrives on port 8080
#         │
#         ▼
# Host: one        →  serve SERVER 1
# Host: two        →  serve SERVER 2
# Host: unknown    →  serve first server block (default)

# To test locally, add to `/etc/hosts`:
# 127.0.0.1   one
# 127.0.0.1   two
# 127.0.0.1   three
# 127.0.0.1   four