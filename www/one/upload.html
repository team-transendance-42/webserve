<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Upload File</title>
    <style>
        body {
            margin: 0;
            font-family: "Comic Sans MS", cursive, sans-serif;
            background: #10131a;
            color: #f2f7ff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            width: 100%;
            max-width: 620px;
            background: #1a2030;
            border: 1px solid #31405f;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
        }
        h1 { margin: 0 0 12px; color: #99d4ff; }
        p { margin: 0 0 16px; }
        label { display: block; margin: 12px 0 8px; font-weight: bold; }
        input[type="file"] { width: 100%; color: #f2f7ff; }
        button {
            margin-top: 18px;
            border: 0;
            border-radius: 10px;
            padding: 10px 16px;
            background: #4fb3ff;
            color: #06111f;
            font-weight: bold;
            cursor: pointer;
        }
        a { color: #9fd8ff; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Upload to Webserv</h1>
        <p>Choose one file and submit. Server saves files into <strong>www/uploads</strong>.</p>
        <form method="POST" action="/upload" enctype="multipart/form-data">
            <label for="file">File</label>
            <input id="file" name="file" type="file" required>
            <button type="submit">Upload</button>
        </form>
        <p style="margin-top: 16px;">Raw mode with curl also works using header <strong>X-Filename</strong>.</p>
        <p><a href="/">Back to home</a></p>
    </div>
</body>
</html>
