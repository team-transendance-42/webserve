<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zomby Kittens</title>
    <style>
        body {
            background: #111;
            color: #fff;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            box-shadow: 0 0 80px 10px #ffb6c1 inset, 0 0 120px 20px #8a2be2 inset;
        }
        .container {
            max-width: 600px;
            margin: 60px auto;
            background: rgba(34, 34, 34, 0.92);
            border-radius: 20px;
            box-shadow: 0 0 40px 10px #ffb6c1, 0 0 60px 20px #6a5acd;
            padding: 40px;
            text-align: center;
        }
        h1 {
            font-size: 3em;
            color: #8a2be2;
            text-shadow: 0 0 12px #ffb6c1, 0 0 8px #00bfff;
            margin-bottom: 0.2em;
        }
        .kitten {
            font-size: 2em;
            margin: 20px 0;
            animation: bounce 1s infinite alternate;
        }
        @keyframes bounce {
            0% { transform: translateY(0);}
            100% { transform: translateY(-20px);}
        }
        .desc {
            font-size: 1.2em;
            margin-bottom: 1em;
        }
        .play-btn {
            background: linear-gradient(90deg, #8a2be2 0%, #ffb6c1 100%);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 16px 32px;
            font-size: 1.3em;
            cursor: pointer;
            box-shadow: 0 4px 16px #ffb6c1, 0 0 8px #00bfff;
            transition: background 0.3s;
        }
        .play-btn:hover {
            background: linear-gradient(90deg, #ffb6c1 0%, #8a2be2 100%);
        }
    </style>
</head>
<body>
    <div style="text-align:left; margin: 18px 0 0 24px;">
        <a href="/" style="color:#8a2be2; font-weight:bold; text-decoration:none; font-size:1.1em;">&larr; Home</a>
    </div>
    <div class="container">
        <h1>🧟‍♂️ Zomby Kittens 🐾</h1>
        <div class="kitten">😺💜😺💖😺💙</div>
        <div class="desc">
            Welcome to the wildest game in town!<br>
            The kittens have turned... ZOMBIE!<br>
            Can you outsmart the undead fluffballs and survive their funky attacks?<br>
            <strong>Beware:</strong> They're cute, but they bite!
        </div>
        <a href="/play" class="play-btn">Play Now!</a>
        <div style="margin-top:2em; font-size:1em;">
            <em>Get ready for chaos, giggles, and a whole lot of zombie kitten fun!</em>
        </div>
    </div>
</body>
</html>
