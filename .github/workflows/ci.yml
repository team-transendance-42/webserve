name: CI

on:
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            g++ make curl python3

      - name: Build
        run: make

      - name: Run all tests
        run: ./tests/run.sh

      - name: Show webserv log
        if: always()
        run: cat webserv.log || true
