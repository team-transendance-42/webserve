server {
    listen          18080;
    host            127.0.0.1;
    server_name     cgilocal;
    client_max_body_size 1048576;

    location /cgi-bin {
        root            ./tests/cgi-bin;
        cgi_extension   .py;
        cgi_pass        /usr/bin/python3;
        allowed_methods GET POST;
    }
}
