# test_err_codes.conf — minimal server for test_err_codes.py
# Port 19090 (avoids collisions with default.conf on 8080-8082)

server {
    listen          19090;
    host            127.0.0.1;
    server_name     errtest;
    clientMaxBodySize 1048576;

    # GET only → POST returns 405 (also checks Allow header is present per RFC 9110)
    location / {
        root            ./www/one;
        index           /index.html;
        allowedMethod   GET;
    }

    # deny all → 403 regardless of method
    location /secret {
        root            ./www/one;
        index           /index.html;
        allowedMethod   GET;
        deny            all;
    }

    # upload + delete → 201, 204, 415
    # root and upload_path must be the same dir so DELETE can find uploaded files
    location /testfiles {
        root                ./www/testfiles;
        upload_path         ./www/testfiles;
        autoindex           on;
        allowedMethod       GET POST DELETE;
        clientMaxBodySize   5000000;
    }

    # tiny body limit → 413 Payload Too Large
    location /limited {
        root                ./www/one;
        index               /index.html;
        allowedMethod       GET POST;
        clientMaxBodySize   5;
    }

    # CGI → 504 Gateway Timeout (slow.py sleeps longer than the 5000ms default)
    location /cgi-bin {
        root            ./tests/cgi-bin;
        cgi_extension   .py;
        cgi_pass        /usr/bin/python3;
        allowedMethod   GET POST;
    }
}
