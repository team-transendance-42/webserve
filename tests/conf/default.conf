# =============================================================
#  default.conf  —  3 virtual servers, all plain HTTP(same ip, diff ports or domain name or server name)
# =============================================================

# ─────────────────────────────────────────
# SERVER 1 — "one"  on port 8080
# ─────────────────────────────────────────
server {
    listen          8080;
    host            127.0.0.1;
    server_name     one;

    clientMaxBodySize   1048576;    # 1MB

    error_page      400     /www/errors/400.html;
    error_page      403     /www/errors/403.html;
    error_page      404     /www/errors/404.html;
    error_page      500     /www/errors/500.html;

    location / {
        root            ./www/one;
        index           /index.html;
        autoindex       on;
        allowedMethod GET POST;
    }

    location /zombie_kittens {
        root            ./www/one/pages;
        index           zombie-kittens.html;
        autoindex       off;
        allowedMethod GET;
    }

    location /game_start {
        root ./www/one/pages;
        index game-start.html;
        autoindex off;
        allowedMethod GET;
    }

     location /zk_apply_form {
        root ./www/one/pages;
        index zk-apply-form.html;
        autoindex off;
        allowedMethod GET POST;
    }

	location /post_body_too_large {
		root ./www/one/pages;
        index post-body-too-large.html;
        autoindex off;
        allowedMethod GET POST;
	}

    location /play {
        return 301 /game_start;
		allowedMethod GET;
    }

    location /uploadfile {
        root            ./www/one/pages;
        index           upload.html;
        autoindex       off;
        allowedMethod   GET;
    }

    # File uploads
    location /uploads {
        root                ./www/uploads;
        upload_path         ./www/uploads;
        allowedMethod       GET DELETE;
        autoindex           on;
        clientMaxBodySize   5000000;
    }

    # Directory listing example
    location /files {
        root        ./www/files;
        autoindex   on;
    }

    # Custom 403 for /secret
    #best practice for guarding sensitive locations.
    location /secret {
        root            ./www/one;
        index           /index.html;
        autoindex       off;
        allowedMethod   GET;
        deny            all;
    }

	  location /not_allowed {
        root            ./www/one/pages;
        index           /not-allowed.html;
        autoindex       off;
        allowedMethod   GET;
    }

    # CGI — Python
    location /cgi-bin {
        root            ./www/one/cgi-bin;
        cgi_extension   .py;
        cgi_pass        /usr/bin/python3;
        allowedMethod GET POST;
    }

    # Redirect example
    location /old {
        return 301 /new;
    }
}

# ─────────────────────────────────────────
# SERVER 2 — "api"  on port 8080
# Purpose: JSON REST API — stricter body limit, no directory listing anywhere.
# ─────────────────────────────────────────
server {
    listen          8081;
    host            127.0.0.1;
    server_name     api;

    clientMaxBodySize   524288;     # 512 KB — API payloads should be small

    error_page      400     /www/errors/400.html;
    error_page      403     /www/errors/403.html;
    error_page      404     /www/errors/404.html;
    error_page      500     /www/errors/500.html;

    # Primary API endpoint — GET to read, POST to submit data.
    location /api/v1 {
        root            ./www/api;
        index           data.json;
        autoindex       off;
        allowedMethod   GET POST;
    }

    # Health-check probe used by load balancers / uptime monitors.
    # Read-only: no writes allowed, no directory listing.
    location /api/health {
        root            ./www/api;
        index           health.json;
        autoindex       off;
        allowedMethod   GET;
    }

}

# ─────────────────────────────────────────
# SERVER 3 — "static"  on port 8082
# Purpose: Serves compiled frontend assets and user-facing downloads.
#          Kept on a separate port so asset traffic can be rate-limited
#          or proxied independently of the main app server.
# ─────────────────────────────────────────
server {
    listen          8082;
    host            127.0.0.1;
    server_name     static;

    clientMaxBodySize   0;          # read-only server — uploads not accepted

    error_page      403     /www/errors/403.html;
    error_page      404     /www/errors/404.html;
    error_page      500     /www/errors/500.html;

    # Compiled CSS / JS / images — no listing, no uploads.
    # Clients request exact filenames; 404 on anything unknown.
    location /static {
        root            ./www/static;
        index           index.html;
        autoindex       off;
        allowedMethod   GET;
    }

    # Publicly browsable file archive — autoindex intentionally on
    # so users can see what is available for download.
    location /downloads {
        root            ./www;
        autoindex       on;
        allowedMethod   GET;
    }

}
