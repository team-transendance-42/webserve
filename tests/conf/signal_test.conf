# signal_test.conf — minimal server for test_signals.py
# Port 19091 (avoids collision with test_err_codes.conf on 19090)

server {
    listen          19091;
    host            127.0.0.1;
    server_name     signaltest;

    location / {
        root            ./www/one;
        index           /index.html;
        allowedMethod   GET;
    }
}
