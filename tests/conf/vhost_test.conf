# vhost_test.conf — two virtual servers sharing port 18080, routed by Host header.
# Used by test_vhost.py to verify name-based virtual hosting.

server {
    listen          18080;
    host            127.0.0.1;
    server_name     alpha;

    location / {
        root            ./www/one;
        index           /index.html;
        allowedMethod   GET;
    }
}

server {
    listen          18080;
    host            127.0.0.1;
    server_name     beta;

    location / {
        root            ./www/api;
        index           data.json;
        allowedMethod   GET;
    }
}
