# =============================================================
#  default.conf  —  4 virtual servers, all plain HTTP
# =============================================================

# ─────────────────────────────────────────
# SERVER 1 — "one"  on port 8080
# ─────────────────────────────────────────
server {
    listen          8080;
    host            127.0.0.1;
    server_name     one;

    client_max_body_size    1048576;    # 1MB

    error_page      400     /errors/400.html;
    error_page      403     /errors/403.html;
    error_page      404     /errors/404.html;
    error_page      500     /errors/500.html;

    location / {
        root            ./www;
        index           ./one/index.html;
        autoindex       off;
        allowed_methods GET POST;
    }

    location /upload {
        root                ./www/uploads;
        allowed_methods     GET POST DELETE;
        client_max_body_size 10485760;   # 10MB override
        upload_store        ./www/one/uploads;
    }

	#location /delete {
		
	#}

}

# ─────────────────────────────────────────
# SERVER 2 — "two"  on port 8080
# (same port as "one" — differentiated by server_name)
# ─────────────────────────────────────────
server {
    listen          8080;
    host            127.0.0.1;
    server_name     two;

    client_max_body_size    512000;     # 500KB

    error_page      404     /errors/404.html;
    error_page      500     /errors/500.html;

    location / {
        root            ./www;
        index           two/index.html;
        autoindex       off;
        allowed_methods GET;
    }

